<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes</title>
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>
<a href="/dashboard">+ regreso a modulo de gestion</a>

<body>
<h1>Lista de Clientes</h1>
<a href="/vista/clientes/nuevo">+ Nuevo Cliente</a>
<br><br>
<table border="1">
    <thead>
    <tr>
        <th>DPI</th>
        <th>Nombre</th>
        <th>Apellido</th>
        <th>Dirección</th>
        <th>Estado</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="cliente : ${clientes}">
        <td th:text="${cliente.DPICliente}"></td>
        <td th:text="${cliente.nombreCliente}"></td>
        <td th:text="${cliente.apellidoCliente}"></td>
        <td th:text="${cliente.direccion}"></td>
        <td th:text="${cliente.estado}"></td>
        <td>
            <a th:href="@{/vista/clientes/editar/{dpi}(dpi=${cliente.DPICliente})}">Editar</a>
            |
            <a th:href="@{/vista/clientes/eliminar/{dpi}(dpi=${cliente.DPICliente})}"
               onclick="return confirm('¿Eliminar este cliente?')">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Cliente</title>
    <link rel="stylesheet" th:href="@{/Style.css}">
</head>

<body>

<a href="/dashboard">← regreso módulo de gestión</a>

<h1>Formulario de Cliente</h1>

<form th:action="@{/vista/clientes/guardar}" th:object="${cliente}" method="post">

    <label>DPI:</label>
    <input type="text" th:field="*{DPICliente}" required />
    <br>

    <label>Nombre:</label>
    <input type="text" th:field="*{nombreCliente}" required />
    <br>

    <label>Apellido:</label>
    <input type="text" th:field="*{apellidoCliente}" required />
    <br>

    <label>Dirección:</label>
    <input type="text" th:field="*{direccion}" />
    <br>

    <label>Estado:</label>
    <select th:field="*{estado}" required>
        <option value="1">Activo</option>
        <option value="0">Inactivo</option>
    </select>

    <br><br>

    <button type="submit">Guardar</button>
    <a th:href="@{/vista/clientes}">Cancelar</a>

</form>

</body>
</html>

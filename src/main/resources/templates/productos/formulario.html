<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Producto</title>
    <link rel="stylesheet" th:href="@{/css/Style.css}">
</head>

<body>

<a href="/dashboard">← regreso a módulo de gestión</a>

<h1>Formulario de Producto</h1>

<form th:action="@{/vista/producto/guardar}" th:object="${producto}" method="post">

    <label>Código:</label>
    <input type="number" th:field="*{codigoProducto}" required />
    <br>

    <label>Nombre:</label>
    <input type="text" th:field="*{nombreProducto}" required />
    <br>

    <label>Precio:</label>
    <input type="number" step="0.01" th:field="*{precio}" required />
    <br>

    <label>Stock:</label>
    <input type="number" th:field="*{stock}" required />
    <br>

    <label>Estado:</label>
    <select th:field="*{estado}" required>
        <option value="1">Activo</option>
        <option value="0">Inactivo</option>
    </select>

    <br><br>

    <button type="submit">Guardar</button>
    <a th:href="@{/vista/producto}">Cancelar</a>

</form>

</body>
</html>

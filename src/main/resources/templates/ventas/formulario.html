<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Venta</title>
    <link rel="stylesheet" th:href="@{/Style.css}">
</head>

<body>

<a href="/dashboard">← regreso a módulo de gestión</a>

<h1>Formulario de Venta</h1>

<form th:action="@{/vista/ventas/guardar}" th:object="${venta}" method="post">

    <label>Código:</label>
    <input type="number" th:field="*{codigoVenta}" required />
    <br>

    <label>Fecha:</label>
    <input type="date" th:field="*{fechaVenta}" required />
    <br>

    <label>Total:</label>
    <input type="number" step="0.01" th:field="*{total}" required />
    <br>

    <label>Estado:</label>
    <select th:field="*{estado}" required>
        <option value="1">Activo</option>
        <option value="0">Inactivo</option>
    </select>

    <br><br>

    <button type="submit">Guardar</button>
    <a th:href="@{/vista/ventas}">Cancelar</a>

</form>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Venta</title>
    <link rel="stylesheet" th:href="@{/Style.css}">
</head>

<body>

<a href="/dashboard">← regreso a módulo de gestión</a>

<h1>Formulario de Venta</h1>

<form th:action="@{/vista/ventas/guardar}" th:object="${venta}" method="post">

    <input type="hidden" th:field="*{codigoVenta}" />

    <label>Fecha:</label>
    <input type="date" th:field="*{fechaVenta}" required />
    <br>

    <label>Total:</label>
    <input type="number" step="0.01" th:field="*{total}" required />
    <br>

    <label>Cliente:</label>
    <select name="dpiCliente" required>
        <option value="">Seleccione cliente</option>
        <option th:each="c : ${clientes}"
                th:value="${c.DPICliente}"
                th:text="${c.nombreCliente + ' ' + c.apellidoCliente}"
                th:selected="${venta.cliente != null && venta.cliente.DPICliente == c.DPICliente}">
        </option>
    </select>
    <br><br>

    <label>Usuario:</label>
    <select name="codigoUsuario" required>
        <option value="">Seleccione usuario</option>
        <option th:each="u : ${usuarios}"
                th:value="${u.codigoUsuario}"
                th:text="${u.username}"
                th:selected="${venta.usuario != null && venta.usuario.codigoUsuario == u.codigoUsuario}">
        </option>
    </select>
    <br><br>

    <input type="hidden" th:field="*{estado}" value="1" />

    <button type="submit">Guardar</button>
    <a th:href="@{/vista/ventas}">Cancelar</a>

</form>

</body>
</html>
